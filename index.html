<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acı Ama Öldürmez</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: #000;
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

<meta name="google-site-verification" content="TUWe4pBCcGUY3pA9nEy2HeBc-TBLrxkQGMOD6YbnBsk" />

    .container {
        text-align: center;
        opacity: 0;
        animation: fadeIn 2s ease forwards;
        z-index: 2;
    }

    h1 {
        font-size: 2.2rem;
        letter-spacing: 2px;
        margin-bottom: 20px;
        animation: slideUp 2s ease forwards;
    }

    p {
        font-size: 1rem;
        opacity: 0.7;
        animation: fadeText 4s ease forwards;
        animation-delay: 2s;
    }

    .heart {
        font-size: 4rem;
        margin: 20px 0;
        animation: pulse 1.5s infinite;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeText {
        to { opacity: 0.8; }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); color: red; }
        100% { transform: scale(1); }
    }

    /* Ana parıltı (göz yaşı efekti) */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background:
            radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.06), transparent 40%),
            radial-gradient(circle at 70% 60%, rgba(255, 0, 0, 0.05), transparent 50%),
            radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 60%);
        animation: bgMove 12s ease-in-out infinite alternate;
    }

    /* ekstra yumuşak ışık katmanı */
    body::after {
        content: "";
        position: absolute;
        width: 150%;
        height: 150%;
        background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
        filter: blur(40px);
        animation: glow 8s ease-in-out infinite alternate;
    }

    @keyframes bgMove {
        from { transform: translate(-10%, -10%) scale(1); }
        to { transform: translate(5%, 5%) scale(1.1); }
    }

    @keyframes glow {
        from { opacity: 0.3; transform: scale(1); }
        to { opacity: 0.6; transform: scale(1.2); }
    }
</style>

</head>

<body>

<div class="container">
    <div class="heart">💔</div>

    <h1>Acıtır… Ama Öldürmez</h1>

    <p>
        "Gözlerin dolarken bile sustun…  
        İşte en çok o sessizlik kırdı beni."
    </p>
</div>

<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</body>
</html>
